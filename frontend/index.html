<!DOCTYPE html>
<html>
<head>
    <title>GigShield AI</title>
    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            padding: 30px;
        }

        .container {
            width: 400px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px #ccc;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 6px 0;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #0056c7;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>GigShield AI – Rider Registration</h2>

    <form>
        <label>Name</label>
        <input type="text" placeholder="Enter your name">

        <label>Phone</label>
        <input type="text" placeholder="Phone number">

        <label>City</label>
        <input type="text" placeholder="City">

        <label>Platform</label>
        <select>
            <option>Zomato</option>
            <option>Swiggy</option>
        </select>

        <label>Zone / Area</label>
        <input type="text" placeholder="Eg: Velachery, Andheri West">

        <button type="button">Register</button>
    </form>
</div>

</body>
</html>
